name: CI

on:
  push:
    branches: ["**"]

jobs:
  # Engine-level smoke tests: real lldb-dap, no Ink rendering.
  # Run on both platforms to verify the DAP layer and adapter resolver work on Linux.
  engine:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          npm-version: 10.9.3
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache LLVM installation (Linux)
        if: runner.os == 'Linux'
        id: cache-lldb
        uses: actions/cache@v4
        with:
          path: /usr/lib/llvm-*
          key: ${{ runner.os }}-llvm-lldb-v1

      - name: Install lldb (Linux)
        if: runner.os == 'Linux' && steps.cache-lldb.outputs.cache-hit != 'true'
        run: sudo apt-get install -y --no-install-recommends lldb

      - name: Set up lldb-dap symlink (Linux)
        if: runner.os == 'Linux'
        run: |
          LLDB_DAP=$(find /usr/lib/llvm-* -name 'lldb-dap' -type f 2>/dev/null | head -1)
          if [ -z "$LLDB_DAP" ]; then
            echo "ERROR: lldb-dap not found in /usr/lib/llvm-*"
            exit 1
          fi
          sudo ln -sf "$LLDB_DAP" /usr/local/bin/lldb-dap
          sudo ldconfig
          lldb-dap --version

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            fixtures/loop-demo/target
            fixtures/multi-file-demo/target
            fixtures/attach-demo/target
            fixtures/c-loop/target
            fixtures/cpp-loop/target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('fixtures/**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Build fixtures
        run: npm run build:fixtures

      - name: Typecheck
        run: npm run typecheck

      - name: Cache codelldb (Windows)
        if: runner.os == 'Windows'
        id: cache-codelldb
        uses: actions/cache@v4
        with:
          path: C:\codelldb
          # Bump vN when a new CodeLLDB release is needed (e.g. LLDB version bump)
          key: windows-codelldb-v1

      - name: Download codelldb (Windows)
        if: runner.os == 'Windows' && steps.cache-codelldb.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          # CodeLLDB ships a patched LLDB that handles Rust PDB symbols without
          # crashing. The VSIX is a ZIP; we extract it in-place and run the adapter
          # from extension/adapter/codelldb.exe which auto-discovers its liblldb.dll
          # at the relative path ../lldb/bin/liblldb.dll.
          $rel = Invoke-RestMethod `
            "https://api.github.com/repos/vadimcn/codelldb/releases/latest" `
            -Headers @{ Authorization = "Bearer ${{ github.token }}" }
          Write-Host "CodeLLDB $($rel.tag_name) assets:"
          $rel.assets | ForEach-Object { Write-Host "  $($_.name)" }

          # Asset naming has varied across CodeLLDB releases; try common patterns.
          $asset = $rel.assets | Where-Object { $_.name -eq "codelldb-x86_64-windows.vsix" }
          if (-not $asset) { $asset = $rel.assets | Where-Object { $_.name -like "codelldb-win32-x64*.vsix" } | Select-Object -First 1 }
          if (-not $asset) { $asset = $rel.assets | Where-Object { $_.name -like "*windows*.vsix" } | Select-Object -First 1 }
          if (-not $asset) { $asset = $rel.assets | Where-Object { $_.name -like "*win32*.vsix" } | Select-Object -First 1 }
          if (-not $asset) {
            Write-Error "Could not find a Windows VSIX in CodeLLDB $($rel.tag_name). See asset list above."
            exit 1
          }
          Write-Host "Downloading: $($asset.name)"
          Invoke-WebRequest $asset.browser_download_url -OutFile "$env:TEMP\codelldb.vsix" -UseBasicParsing
          New-Item -ItemType Directory -Force -Path "C:\codelldb" | Out-Null
          Expand-Archive "$env:TEMP\codelldb.vsix" -DestinationPath "C:\codelldb"
          Write-Host "codelldb adapter: $(Get-Item 'C:\codelldb\extension\adapter\codelldb.exe' | Select-Object -Expand FullName)"
          Write-Host "LLDB bin contents:"
          Get-ChildItem "C:\codelldb\extension\lldb\bin" | Select-Object -First 15 Name

      - name: Verify codelldb (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $adapter = "C:\codelldb\extension\adapter\codelldb.exe"
          if (-not (Test-Path $adapter)) {
            Write-Error "codelldb.exe not found at $adapter"
            exit 1
          }
          Write-Host "codelldb adapter: $adapter ($((Get-Item $adapter).Length) bytes)"

      - name: Allow ptrace for attach smoke test (Linux)
        if: runner.os == 'Linux'
        run: echo 0 | sudo tee /proc/sys/kernel/yama/ptrace_scope

      - name: Install debugpy (Unix)
        if: runner.os != 'Windows'
        run: pip install debugpy

      - name: Smoke — DAP handshake (loop-demo)
        if: runner.os != 'Windows'
        run: npm run smoke

      - name: Smoke — DAP handshake (loop-demo) (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: npm run smoke

      - name: Smoke — DebugSession (loop-demo)
        if: runner.os != 'Windows'
        run: npm run smoke:session

      - name: Smoke — DebugSession (loop-demo) (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: npm run smoke:session

      - name: Smoke — cross-file breakpoints (multi-file-demo)
        if: runner.os != 'Windows'
        run: npm run smoke:multifile

      - name: Smoke — cross-file breakpoints (multi-file-demo) (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: npm run smoke:multifile

      - name: Smoke — process attach (attach-demo)
        if: runner.os != 'Windows'
        run: npm run smoke:attach

      - name: Smoke — Python / debugpy (python-loop)
        if: runner.os != 'Windows'
        run: npm run smoke:python

      - name: Check for orphaned lldb-dap processes (Unix)
        if: always() && runner.os != 'Windows'
        run: |
          if ps aux | grep -v grep | grep -q lldb-dap; then
            echo "FAIL: orphaned lldb-dap processes found after smoke tests"
            ps aux | grep -v grep | grep lldb-dap
            exit 1
          else
            echo "OK: no orphaned lldb-dap processes"
          fi

      - name: Check for orphaned adapter processes (Windows)
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: |
          $procs = @(Get-Process -Name codelldb, lldb-dap -ErrorAction SilentlyContinue)
          if ($procs) {
            Write-Error "FAIL: orphaned adapter processes found after smoke tests"
            $procs | Format-Table
            exit 1
          } else {
            Write-Host "OK: no orphaned codelldb/lldb-dap processes"
          }

  # TUI smoke tests: real Ink rendering + keybinding handlers via ink-testing-library.
  # macOS only — ink-testing-library's fake stdin has unreliable input delivery
  # on Linux (the useInput hook doesn't reliably fire for stdin.write() calls),
  # which is a known ink-testing-library/Linux incompatibility, not a bug in
  # the TUI itself. The engine job above covers all DAP correctness on Linux.
  tui:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          npm-version: 10.9.3
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            fixtures/loop-demo/target
            fixtures/multi-file-demo/target
            ~/.cargo/registry
            ~/.cargo/git
          key: macos-cargo-tui-${{ hashFiles('fixtures/loop-demo/Cargo.lock', 'fixtures/multi-file-demo/Cargo.lock') }}
          restore-keys: macos-cargo-tui-

      - name: Install dependencies
        run: npm ci

      - name: Build fixtures
        run: npm run build:fixtures

      - name: Smoke — TUI session (loop-demo)
        run: npm run smoke:tui

      - name: Smoke — TUI cross-file breakpoints (multi-file-demo)
        run: npm run smoke:tui:multifile

      - name: Check for orphaned lldb-dap processes
        if: always()
        run: |
          if ps aux | grep -v grep | grep -q lldb-dap; then
            echo "FAIL: orphaned lldb-dap processes found after smoke tests"
            ps aux | grep -v grep | grep lldb-dap
            exit 1
          else
            echo "OK: no orphaned lldb-dap processes"
          fi

# The following from the test plan require a human and cannot run in CI:
#
#   Manual: npm run tui:fixture:multi -> press f, jump to report.rs, set
#   breakpoint, run, verify auto-follow
#
#   Manual: npm run tui:fixture:attach in one terminal, start the binary in
#   another, verify WATCHING -> READY
#
# Both flows are covered headlessly by smoke:tui:multifile and smoke:attach
# respectively — CI catches regressions; the manual passes verify real terminal
# rendering and interaction that ink-testing-library structurally cannot see.
