name: CI

on:
  push:
    branches: ["**"]

jobs:
  # Engine-level smoke tests: real lldb-dap, no Ink rendering.
  # Run on both platforms to verify the DAP layer and adapter resolver work on Linux.
  engine:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          npm-version: 10.9.3
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache LLVM installation (Linux)
        if: runner.os == 'Linux'
        id: cache-lldb
        uses: actions/cache@v4
        with:
          path: /usr/lib/llvm-*
          key: ${{ runner.os }}-llvm-lldb-v1

      - name: Install lldb (Linux)
        if: runner.os == 'Linux' && steps.cache-lldb.outputs.cache-hit != 'true'
        run: sudo apt-get install -y --no-install-recommends lldb

      - name: Set up lldb-dap symlink (Linux)
        if: runner.os == 'Linux'
        run: |
          LLDB_DAP=$(find /usr/lib/llvm-* -name 'lldb-dap' -type f 2>/dev/null | head -1)
          if [ -z "$LLDB_DAP" ]; then
            echo "ERROR: lldb-dap not found in /usr/lib/llvm-*"
            exit 1
          fi
          sudo ln -sf "$LLDB_DAP" /usr/local/bin/lldb-dap
          sudo ldconfig
          lldb-dap --version

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            fixtures/loop-demo/target
            fixtures/multi-file-demo/target
            fixtures/attach-demo/target
            fixtures/c-loop/target
            fixtures/cpp-loop/target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('fixtures/**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Build fixtures
        run: npm run build:fixtures

      - name: Typecheck
        run: npm run typecheck

      - name: Cache LLVM installation (Windows)
        if: runner.os == 'Windows'
        id: cache-lldb-win
        uses: actions/cache@v4
        with:
          path: C:\Program Files\LLVM
          key: windows-llvm-20-v4

      - name: Install LLVM (Windows)
        if: runner.os == 'Windows' && steps.cache-lldb-win.outputs.cache-hit != 'true'
        shell: pwsh
        run: choco install llvm --version=20.1.8 --yes --no-progress --force

      - name: Diagnose and fix lldb-dap DLL dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "C:\Program Files\LLVM\bin"

          # Show what dumpbin says lldb-dap.exe and liblldb.dll import.
          # This reveals the exact missing DLL without guessing.
          $dumpbin = Get-ChildItem "C:\Program Files\Microsoft Visual Studio" `
            -Recurse -Filter "dumpbin.exe" -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if ($dumpbin) {
            Write-Host "=== lldb-dap.exe imports ==="
            & $dumpbin.FullName /DEPENDENTS "$bin\lldb-dap.exe"
            Write-Host "=== liblldb.dll imports ==="
            & $dumpbin.FullName /DEPENDENTS "$bin\liblldb.dll"
          } else {
            Write-Host "dumpbin not found, listing DLLs in LLVM\bin:"
            Get-ChildItem $bin -Filter "*.dll" | Select-Object -ExpandProperty Name | Sort-Object
          }

          # lldb-dap links liblldb which links python3xx.dll. The DLL is found
          # via PATH when the SHELL sets it, but child_process.spawn in Node.js
          # uses the inherited process env which may differ. Copy the Python DLL
          # directly into LLVM\bin (step 1 of Windows DLL search = exe directory)
          # so it is found unconditionally, regardless of PATH state.
          $pyDlls = Get-ChildItem "C:\hostedtoolcache\windows\Python" `
            -Recurse -Filter "python3*.dll" -ErrorAction SilentlyContinue
          foreach ($dll in $pyDlls) {
            Write-Host "Copying $($dll.Name) from $($dll.Directory) → $bin"
            Copy-Item $dll.FullName "$bin\" -Force
          }

          Write-Host "=== DLLs in LLVM\bin after fixup ==="
          Get-ChildItem $bin -Filter "*.dll" | Select-Object -ExpandProperty Name | Sort-Object

          Write-Host "=== Test: lldb-dap --help ==="
          & "$bin\lldb-dap.exe" --help
          Write-Host "lldb-dap exit: $LASTEXITCODE"

      - name: Add lldb-dap to PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "C:\Program Files\LLVM\bin"
          if (-not (Test-Path "$bin\lldb-dap.exe")) {
            Write-Error "lldb-dap.exe not found at $bin after LLVM install"
            exit 1
          }
          echo "$bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Write-Host "lldb-dap.exe ready at $bin"

      - name: Allow ptrace for attach smoke test (Linux)
        if: runner.os == 'Linux'
        run: echo 0 | sudo tee /proc/sys/kernel/yama/ptrace_scope

      - name: Engine smoke tests
        run: |
          npm run smoke
          npm run smoke:session
          npm run smoke:multifile
          npm run smoke:attach

      - name: Check for orphaned lldb-dap processes (Unix)
        if: always() && runner.os != 'Windows'
        run: |
          if ps aux | grep -v grep | grep -q lldb-dap; then
            echo "FAIL: orphaned lldb-dap processes found after smoke tests"
            ps aux | grep -v grep | grep lldb-dap
            exit 1
          else
            echo "OK: no orphaned lldb-dap processes"
          fi

      - name: Check for orphaned lldb-dap processes (Windows)
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: |
          $procs = Get-Process -Name lldb-dap -ErrorAction SilentlyContinue
          if ($procs) {
            Write-Error "FAIL: orphaned lldb-dap processes found after smoke tests"
            $procs | Format-Table
            exit 1
          } else {
            Write-Host "OK: no orphaned lldb-dap processes"
          }

  # TUI smoke tests: real Ink rendering + keybinding handlers via ink-testing-library.
  # macOS only — ink-testing-library's fake stdin has unreliable input delivery
  # on Linux (the useInput hook doesn't reliably fire for stdin.write() calls),
  # which is a known ink-testing-library/Linux incompatibility, not a bug in
  # the TUI itself. The engine job above covers all DAP correctness on Linux.
  tui:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          npm-version: 10.9.3
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            fixtures/loop-demo/target
            fixtures/multi-file-demo/target
            ~/.cargo/registry
            ~/.cargo/git
          key: macos-cargo-tui-${{ hashFiles('fixtures/loop-demo/Cargo.lock', 'fixtures/multi-file-demo/Cargo.lock') }}
          restore-keys: macos-cargo-tui-

      - name: Install dependencies
        run: npm ci

      - name: Build fixtures
        run: npm run build:fixtures

      - name: TUI smoke tests
        run: |
          npm run smoke:tui
          npm run smoke:tui:multifile

      - name: Check for orphaned lldb-dap processes
        if: always()
        run: |
          if ps aux | grep -v grep | grep -q lldb-dap; then
            echo "FAIL: orphaned lldb-dap processes found after smoke tests"
            ps aux | grep -v grep | grep lldb-dap
            exit 1
          else
            echo "OK: no orphaned lldb-dap processes"
          fi

# The following from the test plan require a human and cannot run in CI:
#
#   Manual: npm run tui:fixture:multi -> press f, jump to report.rs, set
#   breakpoint, run, verify auto-follow
#
#   Manual: npm run tui:fixture:attach in one terminal, start the binary in
#   another, verify WATCHING -> READY
#
# Both flows are covered headlessly by smoke:tui:multifile and smoke:attach
# respectively — CI catches regressions; the manual passes verify real terminal
# rendering and interaction that ink-testing-library structurally cannot see.
