name: CD

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    # Don't re-trigger on the version-bump commit this job creates
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    permissions:
      contents: write   # push version-bump commit + tag
      id-token: write   # npm provenance

    steps:
      - uses: actions/checkout@v4
        with:
          # Use a token so the version-bump push triggers other workflows
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Compute next CalVer version
        id: calver
        run: |
          YEAR=$(date -u +%Y)
          MONTH=$(date -u +%-m)   # no leading zero: 7 not 07
          LATEST=$(npm view @basvandriel/dbg version 2>/dev/null || echo "0.0.0")
          PUB_YEAR=$(echo "$LATEST" | cut -d. -f1)
          PUB_MONTH=$(echo "$LATEST" | cut -d. -f2)
          PUB_PATCH=$(echo "$LATEST" | cut -d. -f3)
          if [ "$YEAR" = "$PUB_YEAR" ] && [ "$MONTH" = "$PUB_MONTH" ]; then
            PATCH=$((PUB_PATCH + 1))
          else
            PATCH=0
          fi
          VERSION="$YEAR.$MONTH.$PATCH"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Next version: $VERSION"

      - name: Bump package.json version
        run: npm version ${{ steps.calver.outputs.version }} --no-git-tag-version

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: release ${{ steps.calver.outputs.version }} [skip ci]"
          git tag ${{ steps.calver.outputs.version }}
          git push origin main --follow-tags

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        run: npm publish --access=public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
