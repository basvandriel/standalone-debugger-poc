name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && !contains(github.event.workflow_run.head_commit.message, '[skip ci]')

    permissions:
      contents: write   # push version-bump commit + tag (main only)
      id-token: write   # npm provenance

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Compute version and dist-tag
        id: release
        run: |
          YEAR=$(date -u +%Y)
          MONTH=$(date -u +%-m)
          LATEST=$(npm view @basvandriel/dbg version 2>/dev/null || echo "0.0.0")
          PUB_YEAR=$(echo "$LATEST" | cut -d. -f1)
          PUB_MONTH=$(echo "$LATEST" | cut -d. -f2)
          PUB_PATCH=$(echo "$LATEST" | cut -d. -f3)
          if [ "$YEAR" = "$PUB_YEAR" ] && [ "$MONTH" = "$PUB_MONTH" ]; then
            PATCH=$((PUB_PATCH + 1))
          else
            PATCH=0
          fi

          VERSION="$YEAR.$MONTH.$PATCH"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing $VERSION to @latest"

      - name: Bump package.json version
        run: npm version ${{ steps.release.outputs.version }} --no-git-tag-version

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: release ${{ steps.release.outputs.version }} [skip ci]"
          git tag ${{ steps.release.outputs.version }}
          git push origin main --follow-tags

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        run: npm publish --access=public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
